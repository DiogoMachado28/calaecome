<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cala e come</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F7F6F2;
      --surface: #FFFFFF;
      --border: rgba(0,0,0,0.1);
      --border-strong: rgba(0,0,0,0.18);
      --text-primary: #1A1A18;
      --text-secondary: #6B6B67;
      --green: #1D9E75;
      --green-dark: #0F6E56;
      --green-light: #E1F5EE;
      --green-text: #0F6E56;
      --radius-md: 10px;
      --radius-lg: 16px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141412;
        --surface: #1E1E1C;
        --border: rgba(255,255,255,0.1);
        --border-strong: rgba(255,255,255,0.2);
        --text-primary: #F0EFE9;
        --text-secondary: #8A8A85;
        --green-light: #0a2e22;
        --green-text: #4DC99A;
      }
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem 4rem;
    }

    .app {
      width: 100%;
      max-width: 420px;
    }

    header {
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 26px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }

    header p {
      font-size: 15px;
      color: var(--text-secondary);
    }

    .step { margin-bottom: 2rem; }

    .step-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .option-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: inherit;
      color: var(--text-primary);
    }

    .option-btn:hover {
      border-color: var(--border-strong);
      background: var(--bg);
    }

    .option-btn.selected {
      border: 2px solid var(--green);
      background: var(--green-light);
    }

    .option-btn .icon { font-size: 24px; line-height: 1; }

    .option-btn .label {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      display: block;
    }

    .option-btn .sublabel {
      font-size: 12px;
      color: var(--text-secondary);
      display: block;
      margin-top: 2px;
    }

    .option-btn.selected .label { color: var(--green-text); }
    .option-btn.selected .sublabel { color: var(--green); }

    .full-col { grid-column: 1 / -1; }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 0.5rem 0 2rem;
    }

    .btn-main {
      width: 100%;
      padding: 1rem;
      border-radius: var(--radius-lg);
      background: var(--green);
      color: white;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-main:hover { background: var(--green-dark); }
    .btn-main:active { transform: scale(0.98); }
    .btn-main:disabled {
      background: var(--border);
      color: var(--text-secondary);
      cursor: default;
      transform: none;
    }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-top: 1.5rem;
      animation: fadeUp 0.35s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-tag {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 0.6rem;
    }

    .result-name {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 1rem;
      line-height: 1.35;
    }

    .pills { display: flex; flex-wrap: wrap; gap: 6px; }

    .pill {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 999px;
      background: var(--bg);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .no-match {
      text-align: center;
      padding: 1.5rem;
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.6;
    }

    .no-match .emoji { font-size: 32px; display: block; margin-bottom: 0.5rem; }

    .btn-reset {
      margin-top: 0.75rem;
      width: 100%;
      padding: 0.8rem;
      border-radius: var(--radius-lg);
      background: transparent;
      border: 1px solid var(--border);
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-reset:hover {
      background: var(--surface);
      border-color: var(--border-strong);
    }

    #step2, #step3 { display: none; }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>Cala e Come 🍽️</h1>
      <p>Escolhe a base e a proteína.</p>
    </header>

    <section class="step" id="step1">
      <p class="step-label">1 · base</p>
      <div class="grid" id="base-grid">
        <button class="option-btn" data-val="arroz" onclick="selectBase(this)">
          <span class="icon">🍚</span>
          <span><span class="label">Arroz</span></span>
        </button>
        <button class="option-btn" data-val="batata" onclick="selectBase(this)">
          <span class="icon">🥔</span>
          <span><span class="label">Batata</span></span>
        </button>
        <button class="option-btn" data-val="massa" onclick="selectBase(this)">
          <span class="icon">🍝</span>
          <span><span class="label">Massa</span></span>
        </button>
        <button class="option-btn" data-val="surpresa" onclick="selectBase(this)">
          <span class="icon">🎲</span>
          <span>
            <span class="label">Surpreende-me</span>
            <span class="sublabel">escolha aleatória</span>
          </span>
        </button>
      </div>
    </section>

    <div class="divider" id="divider2" style="display:none"></div>

    <section class="step" id="step2">
      <p class="step-label">2 · proteína</p>
      <div class="grid" id="protein-grid">
        <button class="option-btn" data-val="cogumelos" onclick="selectProtein(this)">
          <span class="icon">🍄</span>
          <span><span class="label">Cogumelos</span></span>
        </button>
        <button class="option-btn" data-val="feijao" onclick="selectProtein(this)">
          <span class="icon">🌱</span>
          <span><span class="label">Feijão</span></span>
        </button>
        <button class="option-btn" data-val="grao" onclick="selectProtein(this)">
          <span class="icon">🌾</span>
          <span><span class="label">Grão</span></span>
        </button>
        <button class="option-btn" data-val="carne" onclick="selectProtein(this)">
          <span class="icon">🥩</span>
          <span><span class="label">Carne</span></span>
        </button>
        <button class="option-btn" data-val="atum" onclick="selectProtein(this)">
          <span class="icon">🐟</span>
          <span><span class="label">Atum</span></span>
        </button>
        <button class="option-btn" data-val="peixe" onclick="selectProtein(this)">
          <span class="icon">🐠</span>
          <span><span class="label">Peixe</span></span>
        </button>
        <button class="option-btn" data-val="queijo" onclick="selectProtein(this)">
          <span class="icon">🧀</span>
          <span><span class="label">Queijo</span></span>
        </button>
        <button class="option-btn" data-val="ovo" onclick="selectProtein(this)">
          <span class="icon">🥚</span>
          <span><span class="label">Ovo</span></span>
        </button>
        <button class="option-btn full-col" data-val="aleatorio" onclick="selectProtein(this)">
          <span class="icon">🎲</span>
          <span>
            <span class="label">Aleatório</span>
            <span class="sublabel">escolha aleatória</span>
          </span>
        </button>
      </div>
    </section>

    <section class="step" id="step3">
      <button class="btn-main" onclick="findDish()">
        ✨ Ver prato
      </button>
    </section>

    <div id="result-area"></div>
  </main>

  <script>
    // ─── BASE DE DADOS ───────────────────────────────────────────────
    // Para adicionar um prato, copia um objeto abaixo e preenche:
    //   name     → nome do prato
    //   base     → array com uma ou mais de: "arroz", "batata", "massa"
    //   proteins → array com uma ou mais de: "cogumelos", "feijao", "grao",
    //              "carne", "atum", "peixe", "queijo", "ovo"
    const meals = [
      {
        name: "Puré com grão de bico, cogumelos e manteiga de amendoim",
        base: ["batata"],
        proteins: ["grao", "cogumelos"]
      },
      {
        name: "Massa de pesto com queijo",
        base: ["massa"],
        proteins: ["queijo"]
      },
      {
        name: "Batatas no forno com cogumelos e legumes",
        base: ["batata"],
        proteins: ["cogumelos"]
      },
      {
        name: "Arroz com feijão preto e pimentos",
        base: ["arroz"],
        proteins: ["feijao"]
      },
      {
        name: "Massa com carne picada",
        base: ["massa"],
        proteins: ["carne"]
      },
    ];
    // ────────────────────────────────────────────────────────────────

    const baseLabels = {
      arroz: "Arroz", batata: "Batata", massa: "Massa"
    };
    const proteinLabels = {
      cogumelos: "Cogumelos", feijao: "Feijão", grao: "Grão",
      carne: "Carne", atum: "Atum", peixe: "Peixe",
      queijo: "Queijo", ovo: "Ovo"
    };

    let selectedBase = null;
    let selectedProtein = null;

    function selectBase(btn) {
      document.querySelectorAll('#base-grid .option-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedBase = btn.dataset.val;
      selectedProtein = null;
      document.querySelectorAll('#protein-grid .option-btn').forEach(b => b.classList.remove('selected'));
      document.getElementById('result-area').innerHTML = '';

      if (selectedBase === 'surpresa') {
        document.getElementById('divider2').style.display = 'none';
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step3').style.display = 'block';
      } else {
        document.getElementById('divider2').style.display = 'block';
        document.getElementById('step2').style.display = 'block';
        document.getElementById('step3').style.display = 'none';
      }
    }

    function selectProtein(btn) {
      document.querySelectorAll('#protein-grid .option-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedProtein = btn.dataset.val;
      document.getElementById('result-area').innerHTML = '';
      document.getElementById('step3').style.display = 'block';
    }

    function findDish() {
      const area = document.getElementById('result-area');

      if (selectedBase === 'surpresa') {
        const pick = meals[Math.floor(Math.random() * meals.length)];
        showResult(area, pick, true);
        return;
      }

      let pool = meals.filter(m => m.base.includes(selectedBase));

      if (selectedProtein && selectedProtein !== 'aleatorio') {
        const filtered = pool.filter(m => m.proteins.includes(selectedProtein));
        if (filtered.length > 0) pool = filtered;
      }

      if (pool.length === 0) {
        area.innerHTML = `
          <div class="result-card">
            <div class="no-match">
              <span class="emoji">🤷</span>
              Sem pratos com essa combinação.<br>
              Adiciona mais receitas ao ficheiro!
            </div>
          </div>
          <button class="btn-reset" onclick="reset()">↩ tentar outra combinação</button>
        `;
        return;
      }

      const pick = pool[Math.floor(Math.random() * pool.length)];
      showResult(area, pick, false);
    }

    function showResult(area, dish, isSurprise) {
      const baseName = baseLabels[dish.base[0]] || dish.base[0];
      const pills = [
        `<span class="pill">${baseName}</span>`,
        ...dish.proteins.map(p => `<span class="pill">${proteinLabels[p] || p}</span>`)
      ].join('');

      const tag = isSurprise ? '🎲 surpresa do dia' : '✓ prato encontrado';

      area.innerHTML = `
        <div class="result-card">
          <div class="result-tag">${tag}</div>
          <div class="result-name">${dish.name}</div>
          <div class="pills">${pills}</div>
        </div>
        <button class="btn-reset" onclick="findDish()">🔀 sortear outro prato</button>
        <button class="btn-reset" onclick="reset()" style="margin-top:6px">↩ nova escolha</button>
      `;
    }

    function reset() {
      document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
      selectedBase = null;
      selectedProtein = null;
      document.getElementById('divider2').style.display = 'none';
      document.getElementById('step2').style.display = 'none';
      document.getElementById('step3').style.display = 'none';
      document.getElementById('result-area').innerHTML = '';
    }
  </script>
</body>
</html>
